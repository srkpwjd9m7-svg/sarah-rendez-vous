<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>
<style>
:root{
  --text:#2f2231;
  --muted:#735c68;
  --accent:#e36d6d;
  --accent-deep:#bf4b5f;
  --shadow:0 18px 60px rgba(110,54,68,0.18);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:"Trebuchet MS","Segoe UI",sans-serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    radial-gradient(circle at top left, rgba(255,209,220,0.8), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,240,196,0.8), transparent 24%),
    linear-gradient(160deg, #fff3ea 0%, #ffe2dc 48%, #fff6f0 100%);
}

.login-shell{
  width:min(100%, 460px);
  padding:34px 26px;
  border-radius:32px;
  background:rgba(255,248,244,0.95);
  box-shadow:var(--shadow);
  text-align:center;
}

.eyebrow{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(227,109,109,0.12);
  color:var(--accent-deep);
  font-size:0.85rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

h1{
  margin:18px 0 10px;
  font-size:2.2rem;
}

p{
  color:var(--muted);
  line-height:1.6;
}

form{
  display:grid;
  gap:14px;
  margin-top:22px;
}

input{
  width:100%;
  border:none;
  border-radius:18px;
  background:white;
  padding:15px 16px;
  font:inherit;
  text-align:center;
  letter-spacing:0.2em;
  box-shadow:inset 0 0 0 1px rgba(191,75,95,0.14);
}

input:focus{
  outline:2px solid rgba(227,109,109,0.28);
}

button{
  border:none;
  border-radius:999px;
  padding:14px 20px;
  font:inherit;
  font-weight:700;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg, var(--accent), var(--accent-deep));
  box-shadow:0 12px 26px rgba(191,75,95,0.26);
}

.error{
  min-height:1.2em;
  margin:0;
  color:#b33b55;
  font-size:0.92rem;
}

.helper-links{
  margin-top:18px;
  font-size:0.9rem;
}

.helper-links a{
  color:var(--accent-deep);
  font-weight:700;
  text-decoration:none;
}

.helper-links a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>
  <main class="login-shell">
    <span class="eyebrow">Acces prive</span>
    <h1>Entrer dans notre espace</h1>
    <p>Cette page sert uniquement a la connexion. Une fois le code valide, tu es redirige vers le site des rendez-vous.</p>

    <form id="login-form">
      <input
        type="password"
        id="access-code"
        inputmode="numeric"
        autocomplete="off"
        placeholder="Code d'acces"
        maxlength="8"
        required
      >
      <button type="submit">Ouvrir le site</button>
      <p class="error" id="login-error"></p>
    </form>

    <div class="helper-links">
      Lien du site des rendez-vous : <a href="./app.html">app.html</a>
    </div>
  </main>

<script>
const ACCESS_CODE = "01052021";
const ACCESS_STORAGE_KEY = "nos-rendez-vous-access-ok";
const form = document.getElementById("login-form");
const input = document.getElementById("access-code");
const error = document.getElementById("login-error");

const redirectParam = new URLSearchParams(window.location.search).get("redirect");
const redirectTarget = redirectParam && redirectParam.endsWith(".html") ? "./" + redirectParam : "./app.html";

if (sessionStorage.getItem(ACCESS_STORAGE_KEY) === "ok") {
  window.location.href = redirectTarget;
}

form.addEventListener("submit", (event) => {
  event.preventDefault();

  if (input.value === ACCESS_CODE) {
    sessionStorage.setItem(ACCESS_STORAGE_KEY, "ok");
    window.location.href = redirectTarget;
    return;
  }

  error.textContent = "Code incorrect. Reessaie doucement.";
  input.select();
});

window.setTimeout(() => input.focus(), 60);
</script>
</body>
</html>
