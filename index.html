<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fff7ef">
<title>Nos Rendez-vous</title>
<link rel="stylesheet" href="assets/leaflet/leaflet.css">
<link rel="stylesheet" href="assets/app.css?v=3">
<script>
// Runtime config — derives basePath from URL so the same files serve both
// the production instance (/rdv/) and the public demo (/rdv-demo/).
(function(){
  var seg = location.pathname.split('/').filter(Boolean)[0] || 'rdv';
  var basePath = '/' + seg;
  var isDemo = seg === 'rdv-demo';
  // Demo access code is NOT secret — backend's ACCESS_CODE must match this.
  var DEMO_CODE = 'demo-public';
  window.__rdvConfig = {
    basePath: basePath,
    apiBase: basePath + '/api',
    mediaBase: basePath + '/media',
    isDemo: isDemo,
  };
  if (isDemo) {
    var themeMeta = document.querySelector('meta[name="theme-color"]');
    if (themeMeta) themeMeta.setAttribute('content', '#f5efff');
    var demoCss = document.createElement('link');
    demoCss.rel = 'stylesheet';
    demoCss.href = 'assets/demo-mauve.css?v=1';
    document.head.appendChild(demoCss);
    try {
      localStorage.setItem('nos-rendez-vous-access-code', DEMO_CODE);
      sessionStorage.setItem('nos-rendez-vous-access-ok', 'ok');
    } catch(e) {}
  }
})();
</script>
</head>
<body>

<!-- App shell -->
<div class="shell" id="shell">
  <div class="shell-inner" id="shell-inner">
    <div class="offline-banner" id="offline-banner">Mode hors-ligne — sync indisponible</div>
    <div class="app" id="app"></div>
  </div>
</div>

<script src="assets/leaflet/leaflet.js"></script>
<script src="assets/app.js?v=3"></script>
</body>
</html>
